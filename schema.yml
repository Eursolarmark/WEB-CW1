openapi: 3.0.3
info:
  title: MacroTracker API
  version: 1.0.0
  description: Nutrition and meal logging API with macro analytics.
paths:
  /api/analytics/advanced/:
    get:
      operationId: analytics_advanced_retrieve
      description: |-
        /api/analytics/advanced/
        Provides advanced insights:
          - macro ratio percentages
          - target achievement
          - meal type breakdown
          - weekly/monthly trends
          - daily trend with 7-day moving average
      parameters:
      - in: query
        name: adherence_tolerance_pct
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          default: '10.00'
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: target_kcal
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
      tags:
      - analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvancedAnalyticsResponse'
          description: ''
  /api/analytics/trends/:
    get:
      operationId: analytics_trends_retrieve
      description: |-
        /api/analytics/trends/
        Optional query params:
          - end_date=YYYY-MM-DD (default: today)
          - days=7 (default: 7, allowed 1-31)
          - target_kcal=2000 (default: 2000)
      parameters:
      - in: query
        name: days
        schema:
          type: integer
          maximum: 31
          minimum: 1
          default: 7
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: target_kcal
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
      tags:
      - analytics
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendsResponse'
          description: ''
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Return profile of currently authenticated user.
      tags:
      - auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: |-
        /api/auth/register/
        - POST: Create a user account
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: JWT login endpoint supporting username or email identifier.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/foods/:
    get:
      operationId: foods_list
      description: |-
        /api/foods/
        - GET: List available food items to retrieve valid food_item IDs.
        Optional query params:
          - q: case-insensitive search in name
          - diet_type: filter by enum value (e.g. vegan/high_protein)
      parameters:
      - in: query
        name: carbs_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: carbs_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: diet_type
        schema:
          enum:
          - high_protein
          - keto
          - vegan
          - vegetarian
          - omnivore
          - other
          type: string
          minLength: 1
        description: |-
          * `high_protein` - high_protein
          * `keto` - keto
          * `vegan` - vegan
          * `vegetarian` - vegetarian
          * `omnivore` - omnivore
          * `other` - other
      - in: query
        name: fat_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: fat_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: kcal_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: kcal_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: ordering
        schema:
          enum:
          - name
          - -name
          - per_100g_kcal
          - -per_100g_kcal
          - per_100g_protein
          - -per_100g_protein
          - per_100g_carbs
          - -per_100g_carbs
          - per_100g_fat
          - -per_100g_fat
          type: string
          default: name
          minLength: 1
        description: |-
          * `name` - name
          * `-name` - -name
          * `per_100g_kcal` - per_100g_kcal
          * `-per_100g_kcal` - -per_100g_kcal
          * `per_100g_protein` - per_100g_protein
          * `-per_100g_protein` - -per_100g_protein
          * `per_100g_carbs` - per_100g_carbs
          * `-per_100g_carbs` - -per_100g_carbs
          * `per_100g_fat` - per_100g_fat
          * `-per_100g_fat` - -per_100g_fat
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: protein_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: protein_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: q
        schema:
          type: string
          maxLength: 255
          minLength: 1
      tags:
      - foods
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFoodItemList'
          description: ''
  /api/foods/favorites/:
    get:
      operationId: foods_favorites_list
      description: List and create user favorites.
      tags:
      - foods
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FoodFavorite'
          description: ''
    post:
      operationId: foods_favorites_create
      description: List and create user favorites.
      tags:
      - foods
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoodFavoriteCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FoodFavoriteCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FoodFavoriteCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodFavorite'
          description: ''
  /api/foods/favorites/{food_item_id}/:
    delete:
      operationId: foods_favorites_destroy
      parameters:
      - in: path
        name: food_item_id
        schema:
          type: integer
        required: true
      tags:
      - foods
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/foods/recent/:
    get:
      operationId: foods_recent_list
      description: Return user's recently consumed foods.
      tags:
      - foods
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecentFood'
          description: ''
  /api/foods/search/:
    get:
      operationId: foods_search_retrieve
      description: Fuzzy food search by approximate name.
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 50
          minimum: 1
          default: 10
      - in: query
        name: q
        schema:
          type: string
          maxLength: 255
          minLength: 1
        required: true
      tags:
      - foods
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodFuzzySearchResponse'
          description: ''
  /api/logs/:
    get:
      operationId: logs_list
      description: |-
        /api/logs/
        - POST: Create a meal log entry
        - GET: List meal logs (optional filter by intake_date via ?date=YYYY-MM-DD)
      parameters:
      - in: query
        name: carbs_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: carbs_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: fat_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: fat_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: kcal_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: kcal_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: meal_type
        schema:
          enum:
          - breakfast
          - lunch
          - dinner
          - snack
          type: string
          minLength: 1
        description: |-
          * `breakfast` - breakfast
          * `lunch` - lunch
          * `dinner` - dinner
          * `snack` - snack
      - in: query
        name: meal_types
        schema:
          type: string
          maxLength: 128
          minLength: 1
      - in: query
        name: ordering
        schema:
          enum:
          - intake_date
          - -intake_date
          - created_at
          - -created_at
          - actual_kcal
          - -actual_kcal
          - actual_protein
          - -actual_protein
          - actual_carbs
          - -actual_carbs
          - actual_fat
          - -actual_fat
          type: string
          default: -intake_date
          minLength: 1
        description: |-
          * `intake_date` - intake_date
          * `-intake_date` - -intake_date
          * `created_at` - created_at
          * `-created_at` - -created_at
          * `actual_kcal` - actual_kcal
          * `-actual_kcal` - -actual_kcal
          * `actual_protein` - actual_protein
          * `-actual_protein` - -actual_protein
          * `actual_carbs` - actual_carbs
          * `-actual_carbs` - -actual_carbs
          * `actual_fat` - actual_fat
          * `-actual_fat` - -actual_fat
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: protein_max
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: protein_min
        schema:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      tags:
      - logs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMealLogList'
          description: ''
    post:
      operationId: logs_create
      description: |-
        /api/logs/
        - POST: Create a meal log entry
        - GET: List meal logs (optional filter by intake_date via ?date=YYYY-MM-DD)
      tags:
      - logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MealLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MealLog'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLog'
          description: ''
  /api/logs/{id}/:
    get:
      operationId: logs_retrieve
      description: |-
        /api/logs/{id}/
        - PUT/PATCH: Update meal log
        - DELETE: Remove meal log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - logs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLog'
          description: ''
    put:
      operationId: logs_update
      description: |-
        /api/logs/{id}/
        - PUT/PATCH: Update meal log
        - DELETE: Remove meal log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MealLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MealLog'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLog'
          description: ''
    patch:
      operationId: logs_partial_update
      description: |-
        /api/logs/{id}/
        - PUT/PATCH: Update meal log
        - DELETE: Remove meal log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMealLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMealLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMealLog'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLog'
          description: ''
    delete:
      operationId: logs_destroy
      description: |-
        /api/logs/{id}/
        - PUT/PATCH: Update meal log
        - DELETE: Remove meal log
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - logs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/logs/bulk/:
    post:
      operationId: logs_bulk_create
      description: Create multiple meal logs in one request.
      tags:
      - logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MealLogBulkCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MealLogBulkCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MealLogBulkCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLogBulkCreateResponse'
          description: ''
  /api/logs/daily-summary/:
    get:
      operationId: logs_daily_summary_retrieve
      description: |-
        /api/logs/daily-summary/?date=YYYY-MM-DD
        Return total kcal/protein/carbs/fat for the given date.
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        required: true
      tags:
      - logs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailySummaryResponse'
          description: ''
  /api/logs/quick/:
    post:
      operationId: logs_quick_create
      description: Quick-create a meal log by food name.
      tags:
      - logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickMealLog'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuickMealLog'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuickMealLog'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MealLog'
          description: ''
  /api/profile/targets/:
    get:
      operationId: profile_targets_retrieve
      description: Get or update user nutrition targets.
      tags:
      - profile
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionTarget'
          description: ''
    put:
      operationId: profile_targets_update
      description: Get or update user nutrition targets.
      tags:
      - profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserNutritionTarget'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserNutritionTarget'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserNutritionTarget'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNutritionTarget'
          description: ''
components:
  schemas:
    AdvancedAnalyticsResponse:
      type: object
      properties:
        period:
          $ref: '#/components/schemas/TrendsPeriod'
        totals:
          $ref: '#/components/schemas/AdvancedTotals'
        macro_ratio_percent:
          $ref: '#/components/schemas/MacroRatioPercent'
        target_achievement:
          $ref: '#/components/schemas/TargetAchievement'
        meal_type_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/MealTypeBreakdown'
        weekly_trend:
          type: array
          items:
            $ref: '#/components/schemas/WeeklyTrend'
        monthly_trend:
          type: array
          items:
            $ref: '#/components/schemas/MonthlyTrend'
        daily_trend:
          type: array
          items:
            $ref: '#/components/schemas/AdvancedDailyTrend'
      required:
      - daily_trend
      - macro_ratio_percent
      - meal_type_breakdown
      - monthly_trend
      - period
      - target_achievement
      - totals
      - weekly_trend
    AdvancedDailyTrend:
      type: object
      properties:
        date:
          type: string
          format: date
        log_count:
          type: integer
        total_kcal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total_protein:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total_carbs:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        total_fat:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        kcal_7day_moving_avg:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - date
      - kcal_7day_moving_avg
      - log_count
      - total_carbs
      - total_fat
      - total_kcal
      - total_protein
    AdvancedTotals:
      type: object
      properties:
        kcal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        protein:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        carbs:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        fat:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        avg_daily_kcal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
      - avg_daily_kcal
      - carbs
      - fat
      - kcal
      - protein
    AverageStatusEnum:
      enum:
      - below_target
      - above_target
      - on_target
